<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width,initial-scale=1.0">
        <link rel="stylesheet" href="style.css"></link>
        <title>MAL Stats Viewer</title>
    </head>

    <body>
        <div class="company">
            <h2>Hello Sekai</h2>
        </div>

        <br />

        <div class="title">
            <h1>MyAnimeList Stats Viewer</h1>
            <p>View your activities from your MyAnimeList account.</p>
        </div>

        <div class="loginButton">
            <a id="dynamic-link" href="https://www.youtube.com/watch?v=5t_aXmxUBDI"> <!-- Placeholder link for when uri gets implemented -->
            <input type="button" value="Login with MyAnimeList" />
            </a>
        </div>

        <br />
        <br />
        <br />

        <div class="welcome"></div>

        <div class="timeContainer">
            <!-- Years button -->
            <button class="years-button" id="years-toggle">Years</button>
            <div class="years-content" id="years-choices"></div>

            <!-- Decades button -->
            <button class="decades-button" id="decades-toggle">Decades</button>
            <div class="decades-content" id="decades-choices"></div>

            <!-- All time button-->
            <button class="alltime-button" id="alltime-toggle">All Time</button>
        </div>

        <script type="text/javascript" src="login_button_listener.js"></script>

        <script type="text/javascript" src="stats.js"></script>

    </body>
</html>
