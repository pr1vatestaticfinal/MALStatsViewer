<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Redirecting...</title>

        <script>
            function getCookie(name) {
                const value = `; ${document.cookie}`;
                const parts = value.split(`; ${name}=`);

                if (parts.length === 2) {
                    return parts.pop().split(";").shift();
                }

                return null;
            }

            window.onload = async () => {
                const urlParams = new URLSearchParams(window.location.search);
                const code = urlParams.get("code");
                const state = urlParams.get("state");

                if (!code || !state) {
                    console.error("authorization code or state is missing");
                    return;
                }

                const codeVerifier = getCookie("code_challenge");

                if (!codeVerifier) {
                    console.error("code verifier is missing");
                    return;
                }

                try {
                    const response = await fetch("/get_access_tokens", {
                        method: "POST",
                        headers: { "Content-Type": "application/json" },
                        body: JSON.stringify({ code, code_verifier: codeVerifier })
                    });

                    const data = await response.json();

                    if (data.error) {
                        console.error("Error: ", data.error);
                    }
                    else {
                        const expiryDate = new Date();
                        expiryDate.setTime(expiryDate.getTime() + (10 * 60 * 1000))

                        document.cookie = `access_token=${encodeURIComponent(data.access_token)}; expires=${expiryDate.toUTCString()}; path=/; secure; HttpOnly; SameSite = Strict;`;
                        document.cookie = `refresh_token=${encodeURIComponent(data.refresh_token)}; expires=${expiryDate.toUTCString()}; path=/; secure; HttpOnly; SameSite = Strict;`;
                        console.log("access tokens stored successfully");
                        window.location.href = "/stats";
                    }
                }
                catch (error) {
                    console.error("Error: ", error)
                }
            };
        </script>
    </head>

    <body>
        <h1>Redirecting...</h1>
    </body>
</html>
