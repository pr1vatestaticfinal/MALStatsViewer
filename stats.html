<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width,initial-scale=1.0">
        <link rel="stylesheet" href="stats_style.css"></link>
        <title>MAL Stats Viewer</title>
    </head>

    <body>
        <div class="company">
            <h2>Hello Sekai</h2>
        </div>

        <br />

        <div class="heading">
            <div class="welcome"></div>
            <div class="signout">
                <a href="/">(Sign out)</a>
            </div>
        </div>

        <div class="info">
            <p>Pick a timeframe to view data.</p>
        </div>

        <div id="timeContainer">
            <!-- Years button -->
            <button class="years-button" id="years-toggle">Years</button>
            <div class="dropdown-content" id="years-choices"></div>

            <!-- Decades button -->
            <button class="decades-button" id="decades-toggle">Decades</button>
            <div class="dropdown-content" id="decades-choices"></div>

            <!-- All time button-->
            <button class="alltime-button" id="alltime-toggle">All Time</button>
        </div>

        <div class="added"></div>

        <script type="text/javascript" src="stats.js"></script>
    </body>
</html>
